<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiketi_Yetu</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-50 text-slate-800 font-sans">
    <nav
      class="sticky top-0 z-50 bg-slate-950/95 backdrop-blur-md px-6 md:px-12 py-4 flex items-center justify-between shadow-md border-b border-slate-900 transition-all duration-300"
    >
      <div class="flex items-center flex-shrink-0">
        <a
          href="index.html"
          class="font-black text-2xl tracking-tighter text-white uppercase hover:opacity-90 transition"
        >
          TIKETI<span class="text-orange-500 tracking-normal font-extrabold"
            >YETU</span
          >
        </a>
      </div>

      <div
        class="hidden md:flex items-center space-x-10 font-bold text-sm text-slate-400"
      >
        <a
          href="index.html"
          class="relative py-1 text-orange-500 transition after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-full after:bg-orange-500 after:rounded-full"
        >
          Home Page
        </a>
        <a
          href="contact.html"
          class="relative py-1 hover:text-white transition after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-orange-500 after:transition-all after:duration-300 after:rounded-full"
        >
          Contact Page
        </a>
      </div>

      <div class="flex items-center flex-shrink-0">
        <a
          href="ticket.html"
          class="inline-flex items-center justify-center bg-gradient-to-r from-orange-500 to-orange-600 text-white px-6 py-2.5 rounded-xl font-bold text-xs tracking-wider uppercase shadow-md"
        >
          Grab a Ticket
          <svg
            class="w-3.5 h-3.5 ml-1.5 opacity-90"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            ></path>
          </svg>
        </a>
      </div>
    </nav>
    <header
      class="relative bg-slate-900 h-64 md:h-96 flex items-center justify-center overflow-visible"
    >
      <img
        src="events 02.jpeg"
        alt="jowi"
        class="absolute inset-0 w-full h-full object-cover object-center z-0 "
      />

      <div class="absolute inset-0 bg-black/20 z-10"></div>

      <div
        class="absolute bottom-0 translate-y-1/2 left-1/2 -translate-x-1/2 w-11/12 max-w-5xl bg-white rounded-xl shadow-2xl p-4 border border-slate-100 z-30"
      >
        <form
          id="searchForm"
          class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center"
        >
          <div
            class="border-b md:border-b-0 md:border-r border-slate-200 pb-2 md:pb-0 pr-2"
          >
            <label
              class="block text-xs font-bold text-slate-400 uppercase tracking-wider"
              >Search</label
            >
            <input
              type="text"
              id="searchInput"
              placeholder="Artist or event"
              class="w-full text-sm font-semibold text-slate-700 focus:outline-none pt-1"
            />
          </div>

          <div
            class="border-b md:border-b-0 md:border-r border-slate-200 pb-2 md:pb-0 pr-2 md:pl-2"
          >
            <label
              class="block text-xs font-bold text-slate-400 uppercase tracking-wider"
              >Venue</label
            >
            <input
              type="text"
              id="venueInput"
              placeholder="Enter venue"
              class="w-full text-sm font-semibold text-slate-700 focus:outline-none pt-1"
            />
          </div>

          <div
            class="border-b md:border-b-0 md:border-r border-slate-200 pb-2 md:pb-0 pr-2 md:pl-2"
          >
            <label
              class="block text-xs font-bold text-slate-400 uppercase tracking-wider"
              >Date</label
            >
            <input
              type="date"
              id="dateInput"
              class="w-full text-sm font-semibold text-slate-500 focus:outline-none pt-1"
            />
          </div>

          <div>
            <button
              type="submit"
              class="w-full font-extrabold py-3 px-6 rounded-lg inline-flex items-center justify-center bg-gradient-to-r from-orange-500 to-orange-600 text-white tracking-wider uppercase shadow-md"
            >
              Search
            </button>
          </div>
        </form>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-24 pb-16">
      <div class="flex justify-between items-center mb-8">
        <h2
          class="text-xl md:text-2xl font-black text-slate-900 tracking-tight uppercase"
        >
          Events Ticketed By YourApp
        </h2>
        <a href="#" class="text-sm font-bold text-indigo-600 hover:underline"
          >View All</a
        >
      </div>

      <div
        id="eventsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </main>

    <script src="index.js"></script>

    <footer class="bg-slate-950 border-t border-slate-900">
      <div class="mx-auto w-full max-w-screen-xl p-6 py-8 lg:py-12">
        <div class="md:flex md:justify-between gap-8">
          <div class="mb-8 md:mb-0 flex items-center justify-start">
            <a
              href="index.html"
              class="font-black text-2xl tracking-tighter text-white uppercase hover:opacity-90 transition"
            >
              TIKETI<span class="text-orange-500 tracking-normal font-extrabold"
                >YETU</span
              >
            </a>
          </div>

          <div class="grid grid-cols-2 gap-8 sm:gap-12 sm:grid-cols-3">
            <div>
              <h2
                class="mb-4 text-xs font-black text-slate-400 uppercase tracking-widest"
              >
                Pages
              </h2>
              <ul class="text-slate-500 font-semibold text-sm space-y-2.5">
                <li>
                  <a href="index.html" class="hover:text-orange-500 transition"
                    >Home Page</a
                  >
                </li>
                <li>
                  <a
                    href="contact.html"
                    class="hover:text-orange-500 transition"
                    >Contact Page</a
                  >
                </li>
              </ul>
            </div>

            <div>
              <h2
                class="mb-4 text-xs font-black text-slate-400 uppercase tracking-widest"
              >
                Follow Us
              </h2>
              <ul class="text-slate-500 font-semibold text-sm space-y-2.5">
                <li>
                  <a
                    href="https://www.instagram.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="hover:text-orange-500 transition"
                    >Instagram</a
                  >
                </li>
                <li>
                  <a
                    href="https://www.tiktok.com/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="hover:text-orange-500 transition"
                    >TikTok</a
                  >
                </li>
              </ul>
            </div>

            <div>
              <h2
                class="mb-4 text-xs font-black text-slate-400 uppercase tracking-widest"
              >
                Legal
              </h2>
              <ul class="text-slate-500 font-semibold text-sm space-y-2.5">
                <li>
                  <a href="#" class="hover:text-orange-500 transition"
                    >Privacy Policy</a
                  >
                </li>
                <li>
                  <a href="#" class="hover:text-orange-500 transition"
                    >Terms & Conditions</a
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>

        <hr class="my-6 border-slate-900 sm:mx-auto lg:my-8" />

        <div class="sm:flex sm:items-center sm:justify-between">
          <span class="text-xs font-medium text-slate-600 sm:text-center">
            @copy; 2026
            <a
              href="index.html"
              class="hover:text-slate-400 transition font-bold"
              >Tiketi Yetu</a
            >. All Rights Reserved.
          </span>

          <div
            class="flex mt-4 sm:justify-center sm:mt-0 space-x-5 text-slate-600"
          >
            <a href="#" class="hover:text-white transition">
              <svg
                class="w-4 h-4"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  fill-rule="evenodd"
                  d="M13.135 6H15V3h-1.865a4.147 4.147 0 0 0-4.142 4.142V9H7v3h2v9.938h3V12h2.021l.592-3H12V6.591A.6.6 0 0 1 12.592 6h.543Z"
                  clip-rule="evenodd"
                />
              </svg>
              <span class="sr-only">Facebook</span>
            </a>
            <a href="#" class="hover:text-white transition">
              <svg
                class="w-4 h-4"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M18.942 5.556a16.3 16.3 0 0 0-4.126-1.3 12.04 12.04 0 0 0-.529 1.1 15.175 15.175 0 0 0-4.573 0 11.586 11.586 0 0 0-.535-1.1 16.274 16.274 0 0 0-4.129 1.3 17.392 17.392 0 0 0-2.868 11.662 15.785 15.785 0 0 0 4.963 2.521c.41-.564.773-1.16 1.084-1.785a10.638 10.638 0 0 1-1.706-.83c.143-.106.283-.217.418-.331a11.664 11.664 0 0 0 10.118 0c.137.114.277.225.418.331-.544.328-1.116.606-1.71.832a12.58 12.58 0 0 0 1.084 1.785 16.46 16.46 0 0 0 5.064-2.595 17.286 17.286 0 0 0-2.973-11.59ZM8.678 14.813a1.94 1.94 0 0 1-1.8-2.045 1.93 1.93 0 0 1 1.8-2.047 1.918 1.918 0 0 1 1.8 2."
                />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
