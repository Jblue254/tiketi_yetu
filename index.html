<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiketi Yetu</title>
    <script src="https://jsdelivr.net"></script>
  </head>
  <body>
    <div>
      <header class="">
        <img src="" alt="Tiketi yetu" />
      </header>
      <section class="">
        <h1 class="">KARIBU TIKETI YETU</h1>
        <p>Create your event ticket by filling in your details below.</p>
      </section>

      <form id="form_filler" class="">
        <div>
          <label for="photo upload">Upload your photo</label>
          <div>
            <input type="file" id="file_uploads" class="hidden" />
            <label for="file-uploads" class="">
              <p>Drag or drop to upload a file</p>
            </label>
          </div>
          <p class="">JPG or PNG</p>
        </div>
        <div>
          <label class="block mb-2"> Full Names </label>
          <input
            type="text"
            name="name"
            placeholder="Jane Doe"
            class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500"
          />
        </div>
        <div>
          <label class="block mb-2"> Email address </label>
          <input
            type="email"
            name="email"
            placeholder="janemwogli@gmail.com"
            class="w-full px-4 py-3 rounded-xl border"
          />
        </div>
        <div>
          <label class="block mb-2"> Username </label>
          <input
            type="text"
            name="JBLUE"
            placeholder="Jina la Mtumiaji"
            class="w-full px-4 py-3 rounded-xl bg-slate-900"
          />
        </div>
        <button class="">Create my ticket</button>
      </form>
      <footer class="mt-16 flex justify-center">
        <div
          class="w-full max-w-xl bg-gradient-to-r from-slate-900 to-slate-800 border border-slate-700 rounded-3xl p-6"
        >
          <div class="flex justify-between items-start">
            <div class="flex items-center gap-4">
              <img src="" alt="logo" class="w-12" />
              <div>
                <h3 class="font-bold text-xl">Tiketi Yetu</h3>
                <p class="text-slate-400 text-sm">Nairobi, Kenya</p>
              </div>
            </div>
            <span class="text-slate-500"> #001 </span>
          </div>
          <div class="flex items-center gap-4 mt-8">
            <img
              src=""
              alt="avatar"
              class="w-20 h-20 rounded-2xl object-cover"
            />
            <div>
              <h3 class="font-bold text-xl">Jonathan Doe</h3>
              <p class="text-slate-400">@yourusername</p>
              <p class="text-slate-500 text-sm">user@example.com</p>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
