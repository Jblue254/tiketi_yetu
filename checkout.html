<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Tiketi Yetu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-950 text-white flex items-center justify-center p-4 min-h-screen">
    <div class="w-full max-w-xl mx-auto space-y-8">
      
      <header class="text-center space-y-2">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-orange-400 to-amber-500 bg-clip-text text-transparent uppercase tracking-wider">
          Review & Pay
        </h1>
        <p class="text-slate-400 text-sm">
          Review your ticket choice and finalize your order.
        </p>
      </header>

      <div class="bg-gradient-to-r from-orange-500 to-amber-400 p-[1px] rounded-3xl shadow-2xl">
        <div class="bg-slate-950 rounded-[23px] p-6 sm:p-8 space-y-6">
          
          <div class="space-y-4">
            <h2 class="text-lg font-bold text-slate-200 border-b border-slate-900 pb-3">
              Order Summary
            </h2>

            <div class="flex justify-between items-center py-1">
              <span class="text-slate-400 text-sm">Attendee Name</span>
              <span id="summary-name" class="font-semibold text-slate-200">--</span>
            </div>

            <div class="flex justify-between items-center py-1">
              <span class="text-slate-400 text-sm">Email Address</span>
              <span id="summary-email" class="font-semibold text-slate-200">--</span>
            </div>

            <div class="flex justify-between items-center py-1">
              <span class="text-slate-400 text-sm">Your Handle</span>
              <span id="summary-github" class="text-orange-400 font-medium">@--</span>
            </div>

            <div class="space-y-2 border-t border-slate-900/60 pt-4">
              <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                Selected Tickets
              </h3>
              
              <div id="order-breakdown-container" class="space-y-1">
                </div>
            </div>
          </div>

          <div class="bg-slate-900/50 border border-slate-900 rounded-2xl p-4 flex justify-between items-center">
            <span class="text-sm font-medium text-slate-400">Total Amount Due</span>
            <span id="summary-price" class="text-2xl font-black text-orange-400">0 KES</span>
          </div>

          <div class="space-y-3 pt-4 border-t border-slate-900/40">
            <button
              id="btn-pay"
              type="button"
              class="w-full py-4 bg-gradient-to-r from-orange-500 to-amber-400 hover:from-orange-600 hover:to-amber-500 font-bold rounded-xl text-center text-white cursor-pointer transition-all active:scale-[0.99] shadow-lg shadow-orange-950/20 block"
            >
              Confirm & Pay via M-Pesa / Card
            </button>
            <a
              href="ticket.html"
              class="block text-center text-xs text-slate-400 hover:text-orange-400 transition-colors py-2 font-medium"
            >
              ← Add or modify ticket options
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="checkout.js"></script>
  </body>
</html>
